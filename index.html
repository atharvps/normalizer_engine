<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normalizer Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <svg class="nav-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            <h1 class="nav-title">Normalizer Engine</h1>
        </div>
        <div class="nav-right">
            <span class="nav-subtitle">CFG Transformations</span>
            <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle Theme">
                <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="glass-panel">
                <h2>Input CFG <button class="status-badge eps-btn" onclick="insertEpsilon()" title="Insert Epsilon symbol">Click to insert ε or type eps</button></h2>
                <div class="input-wrapper">
                    <textarea id="grammar-input" spellcheck="false">
S -> ABC | ε
A -> aA | eps
B -> bB | ε
C -> cC | c</textarea>
                    <div class="error-msg" id="error-output"></div>
                </div>
                <div class="btn-group">
                    <button class="action-btn" onclick="startConversion('CNF')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        To CNF
                    </button>
                    <button class="action-btn success" onclick="startConversion('GNF')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        To GNF
                    </button>
                </div>
            </div>

            <div class="glass-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                    <h2 style="margin: 0;">Transformation Process</h2>
                    <div class="btn-group" style="margin-top: 0; width: auto;">
                        <button class="action-btn" id="btn-next" onclick="nextStep()" disabled>Next →</button>
                        <button class="action-btn success" id="btn-run-all" onclick="runAll()" disabled>Run All ⚡</button>
                        <button class="action-btn reset" id="btn-reset" onclick="resetUI()" disabled>⟳</button>
                    </div>
                </div>

                <div class="output-wrapper">
                    <div class="stepper" id="stepper">
                        <div style="color: var(--text-muted); text-align: center; font-size: 0.85rem; margin-top: 1rem;">
                            Select a target normal form to begin.
                        </div>
                    </div>

                    <div class="editor-window">
                        <div class="editor-header">
                            <div class="mac-dot red"></div>
                            <div class="mac-dot yellow"></div>
                            <div class="mac-dot green"></div>
                        </div>
                        <div class="grammar-display" id="grammar-output">
                            <div style="color: var(--syntax-arrow); text-align: center; margin-top: 3rem; font-style: italic; font-size: 0.95rem;">
                                // Compiled output will render here...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
